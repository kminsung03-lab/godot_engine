<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interstellar Stock Trader</title>
    <link rel="stylesheet" href="style.css">
    <!-- Three.js CDN -->
    <script async src="https://unpkg.com/es-module-shims@1.6.3/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="app">
        <!-- 3D Scene will be rendered here -->
        <div id="three-container"></div>

        <!-- UI Overlay -->
        <div id="ui-overlay">
            <header>
                <h1>Interstellar Stock Trader</h1>
                <div id="credits">Credits: <span id="credit-amount">10000</span></div>
            </header>

            <main>
                <section id="stock-market-section">
                    <h2>Stock Market</h2>
                    <stock-market></stock-market>
                </section>

                <section id="navigation-section">
                    <h2>Navigation</h2>
                    <space-navigation></space-navigation>
                </section>
            </main>
        </div>
    </div>
    <script type="module" src="main.js"></script>
</body>
</html>
